<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mushy Parfum — Scent of Elegance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #C7A962;
      --gold-dim: #8B7355;
      --cream:    #E8DCC8;
      --ink:      #0a0806;
      --ink-soft: #141210;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HERO ───────────────────────────────────────── */
    #hero {
      height: 500vh;
      position: relative;
    }

    #hero-sticky {
      position: sticky;
      top: 0;
      height: 100svh;          /* safe-area aware */
      height: 100vh;
      overflow: hidden;
    }

    #heroVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* subtle dark edges so buttons read against any video frame */
    #hero-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 50% 0%,   rgba(10,8,6,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 120% 40% at 50% 100%,  rgba(10,8,6,0.70) 0%, transparent 70%),
        radial-gradient(ellipse 40%  100% at 0%   50%, rgba(10,8,6,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 40%  100% at 100% 50%, rgba(10,8,6,0.35) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── MENU BUTTON ────────────────────────────────── */
    #menuBtn {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: rgba(10, 8, 6, 0.45);
      border: 1px solid rgba(199, 169, 98, 0.30);
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  background 0.3s ease,
                  border-color 0.3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #menuBtn:hover  { background: rgba(199, 169, 98, 0.15); border-color: rgba(199, 169, 98, 0.6); }
    #menuBtn:active { background: rgba(199, 169, 98, 0.25); }

    .menu-bar {
      width: 20px;
      height: 1.5px;
      background: var(--gold);
      border-radius: 1px;
      transition: width 0.3s ease;
    }
    .menu-bar:nth-child(2) { width: 14px; align-self: flex-start; margin-left: 12px; }

    /* ── SEE MORE BUTTON ────────────────────────────── */
    #seeMoreBtn {
      position: absolute;
      bottom: 33%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #seeMoreBtn span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      white-space: nowrap;
      text-shadow: 0 1px 12px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.5);
    }

    .see-more-line {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: pulse-line 2s ease-in-out infinite;
    }

    @keyframes pulse-line {
      0%, 100% { opacity: 0.6; transform: scaleY(1); }
      50%       { opacity: 1;   transform: scaleY(1.15); }
    }

    #seeMoreBtn:active span { color: var(--gold); }

    /* ── MENU OVERLAY ───────────────────────────────── */
    #menuOverlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--ink);
      transform: translateX(100%);
      transition: transform 0.55s cubic-bezier(0.76, 0, 0.24, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #menuOverlay.open {
      transform: translateX(0%);
    }

    /* grain texture overlay */
    #menuOverlay::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }

    /* gold vertical accent line */
    #menuOverlay::after {
      content: '';
      position: absolute;
      left: 32px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim) 20%, var(--gold-dim) 80%, transparent);
      opacity: 0.4;
    }

    #menuHeader {
      padding: 24px 20px 24px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #menuLogo {
      height: 36px;
      width: auto;
      opacity: 0.92;
    }

    #closeBtn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(199, 169, 98, 0.20);
      border-radius: 4px;
      cursor: pointer;
      color: var(--gold);
      font-size: 18px;
      font-weight: 300;
      line-height: 1;
      transition: background 0.25s ease, border-color 0.25s ease;
      flex-shrink: 0;
    }
    #closeBtn:hover  { background: rgba(199, 169, 98, 0.1); border-color: rgba(199, 169, 98, 0.5); }
    #closeBtn:active { background: rgba(199, 169, 98, 0.2); }

    #menuDivider {
      height: 1px;
      margin: 0 20px 0 52px;
      background: linear-gradient(to right, var(--gold-dim), transparent);
      opacity: 0.35;
      flex-shrink: 0;
    }

    #menuNav {
      flex: 1;
      padding: 48px 20px 32px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .nav-item {
      display: block;
      padding: 14px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--cream);
      text-decoration: none;
      border-bottom: 1px solid rgba(199, 169, 98, 0.08);
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease;
    }

    .nav-item::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .nav-item:hover       { color: var(--gold); }
    .nav-item:hover::after { width: 100%; }
    .nav-item:active       { color: var(--cream); }

    .nav-item-num {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--gold-dim);
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      vertical-align: super;
      margin-right: 6px;
    }

    #menuFooter {
      padding: 24px 20px 40px 52px;
      flex-shrink: 0;
    }

    .menu-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.06em;
      color: var(--gold-dim);
      margin-bottom: 20px;
    }

    .social-row {
      display: flex;
      gap: 20px;
    }

    .social-link {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232, 220, 200, 0.45);
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .social-link:hover { color: var(--gold); }

    /* ── CONTENT SECTION (placeholder) ─────────────── */
    #content {
      min-height: 100vh;
      background: var(--ink-soft);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      gap: 16px;
    }

    .content-eyebrow {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .content-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.15;
      color: var(--cream);
    }

    .content-body {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(232, 220, 200, 0.6);
      text-align: center;
      max-width: 300px;
    }
  </style>
</head>

<body>

  <!-- ════════════════════════════════════════════════ -->
  <!--  HERO — scroll-driven video                      -->
  <!-- ════════════════════════════════════════════════ -->
  <section id="hero">
    <div id="hero-sticky">

      <!-- Background video (scroll-controlled) -->
      <video
        id="heroVideo"
        muted
        playsinline
        preload="auto"
        disablepictureinpicture
        disableremoteplayback
      >
        <source src="assets/hero.mp4" type="video/mp4" />
      </video>

      <!-- Edge vignette -->
      <div id="hero-vignette" aria-hidden="true"></div>

      <!-- Menu button — top right, fades in near end of scroll -->
      <button id="menuBtn" aria-label="Open menu">
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
        <span class="menu-bar"></span>
      </button>

      <!-- See More — bottom third, fades in near end of scroll -->
      <button id="seeMoreBtn" aria-label="See more">
        <span>See more</span>
        <div class="see-more-line" aria-hidden="true"></div>
      </button>

    </div>
  </section>

  <!-- ════════════════════════════════════════════════ -->
  <!--  CONTENT — landing area after hero              -->
  <!-- ════════════════════════════════════════════════ -->
  <section id="content">
    <p class="content-eyebrow">Scent of Elegance</p>
    <h2 class="content-heading">The Art of<br/>Fine Fragrance</h2>
    <p class="content-body">
      Each bottle is a story — crafted with precision,<br/>
      worn with confidence.
    </p>
  </section>


  <!-- ════════════════════════════════════════════════ -->
  <!--  MENU OVERLAY                                    -->
  <!-- ════════════════════════════════════════════════ -->
  <div id="menuOverlay" role="dialog" aria-modal="true" aria-label="Navigation menu">

    <div id="menuHeader">
      <img id="menuLogo" src="assets/logo.jpeg" alt="Mushy Parfum" />
      <button id="closeBtn" aria-label="Close menu">&#215;</button>
    </div>

    <div id="menuDivider" aria-hidden="true"></div>

    <nav id="menuNav">
      <a href="#" class="nav-item" onclick="closeMenu()">
        <span class="nav-item-num">01</span>Collections
      </a>
      <a href="#" class="nav-item" onclick="closeMenu()">
        <span class="nav-item-num">02</span>About
      </a>
      <a href="#" class="nav-item" onclick="closeMenu()">
        <span class="nav-item-num">03</span>Stockists
      </a>
      <a href="#" class="nav-item" onclick="closeMenu()">
        <span class="nav-item-num">04</span>Contact
      </a>
    </nav>

    <div id="menuFooter">
      <p class="menu-tagline">"Elegance · Confidence · Class"</p>
      <div class="social-row">
        <a href="#" class="social-link">Instagram</a>
        <a href="#" class="social-link">TikTok</a>
        <a href="#" class="social-link">Pinterest</a>
      </div>
    </div>

  </div>


  <!-- ════════════════════════════════════════════════ -->
  <!--  SCROLL-DRIVEN VIDEO LOGIC                       -->
  <!-- ════════════════════════════════════════════════ -->
  <script>
    (function () {
      const video      = document.getElementById('heroVideo');
      const hero       = document.getElementById('hero');
      const seeMoreBtn = document.getElementById('seeMoreBtn');
      const menuBtn    = document.getElementById('menuBtn');
      const menuOverlay = document.getElementById('menuOverlay');

      // Track whether video metadata is ready
      let videoDuration = 0;

      video.addEventListener('loadedmetadata', () => {
        videoDuration = video.duration;
        // Seek to frame 0 so first frame shows immediately
        video.currentTime = 0;
      });

      // ── Scroll handler ──────────────────────────────
      function onScroll() {
        const scrollTop        = window.scrollY;
        const heroScrollRange  = hero.offsetHeight - window.innerHeight;
        const progress         = heroScrollRange > 0
          ? Math.max(0, Math.min(scrollTop / heroScrollRange, 1))
          : 0;

        // Drive video time
        if (videoDuration > 0) {
          const target = progress * videoDuration;
          // Only seek if the delta is noticeable (avoids micro-stutters)
          if (Math.abs(video.currentTime - target) > 0.016) {
            video.currentTime = target;
          }
        }

        // ── Fade in UI elements in the final 20% of scroll ──
        const FADE_START  = 0.78;
        const FADE_FINISH = 0.96;

        if (progress >= FADE_START) {
          const t       = (progress - FADE_START) / (FADE_FINISH - FADE_START);
          const opacity = Math.min(t, 1);

          seeMoreBtn.style.opacity      = opacity;
          menuBtn.style.opacity         = opacity;
          seeMoreBtn.style.pointerEvents = opacity > 0.4 ? 'auto' : 'none';
          menuBtn.style.pointerEvents    = opacity > 0.4 ? 'auto' : 'none';
        } else {
          seeMoreBtn.style.opacity      = 0;
          menuBtn.style.opacity         = 0;
          seeMoreBtn.style.pointerEvents = 'none';
          menuBtn.style.pointerEvents    = 'none';
        }
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      // Run once on load in case page is already scrolled
      onScroll();

      // ── See More — smooth scroll to content ─────────
      seeMoreBtn.addEventListener('click', () => {
        document.getElementById('content').scrollIntoView({ behavior: 'smooth' });
      });

      // ── Menu open / close ────────────────────────────
      menuBtn.addEventListener('click', openMenu);
      document.getElementById('closeBtn').addEventListener('click', closeMenu);

      // Close on backdrop tap (tap outside the nav panel)
      menuOverlay.addEventListener('click', function (e) {
        if (e.target === menuOverlay) closeMenu();
      });

      // Close on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMenu();
      });

      function openMenu() {
        menuOverlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      // Exposed globally for the inline onclick on nav items
      window.closeMenu = function closeMenu() {
        menuOverlay.classList.remove('open');
        document.body.style.overflow = '';
      }
    })();
  </script>

</body>
</html>
